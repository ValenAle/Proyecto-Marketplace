<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - FIVOX</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="/css/loginstyle.css">

  <style>
    .alert-msg {
      border-radius: 12px;
      font-size: 14px;
      padding: 10px 14px;
    }
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none !important;
    }
  </style>

</head>

<body>

  <div class="container-fluid h-100 d-flex justify-content-center align-items-center p-4">

    <div class="login-container row g-0">

      <div class="col-lg-7 d-flex flex-column justify-content-between p-5 left-side">

        <div class="logo">
          FIVOX
        </div>

        <div class="w-75">

          <h1 class="left-title mb-4">
            Unite a la comunidad.
          </h1>

          <p class="left-text">
            Creá tu cuenta y empezá a conectar
            con profesionales y clientes
            en un solo lugar.
          </p>

        </div>

        <div></div>

        <div class="circle circle1"></div>
        <div class="circle circle2"></div>

      </div>

      <div class="col-lg-5 d-flex align-items-center justify-content-center p-5 right-side">

        <div class="w-100 form-box">

          <h2 class="login-title mb-2">
            Crear cuenta
          </h2>

          <p class="subtitle mb-4">
            Completá tus datos para registrarte
          </p>

          <div id="alert-box" class="d-none"></div>

          <form id="register-form" novalidate>

            <div class="mb-4">

              <label class="form-label">
                Nombre
              </label>

              <input
                type="text"
                id="name"
                class="form-control"
                placeholder="Tu nombre"
                required
              >

            </div>

            <div class="mb-4">

              <label class="form-label">
                Email
              </label>

              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="ejemplo@email.com"
                required
              >

            </div>

            <div class="mb-4">

              <label class="form-label">
                Contraseña
              </label>

              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Mínimo 6 caracteres"
                minlength="6"
                required
              >

            </div>

            <button id="btn-register" class="btn btn-login w-100" type="submit">

              <i class="bi bi-person-plus me-2"></i>

              Registrarme

            </button>

          </form>

          <div class="text-center mt-4">

            <span class="text-secondary">
              ¿Ya tenés cuenta?
            </span>

            <a href="/" class="custom-link">
              Iniciar sesión
            </a>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script>
    const API_URL = '/api';

    const form        = document.getElementById('register-form');
    const btnRegister = document.getElementById('btn-register');
    const alertBox    = document.getElementById('alert-box');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email || !password) {
        showAlert('Por favor completá todos los campos.', 'danger');
        return;
      }

      if (password.length < 6) {
        showAlert('La contraseña debe tener al menos 6 caracteres.', 'danger');
        return;
      }

      setLoading(true);
      clearAlert();

      try {
        const res = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          showAlert(data.message || 'Error al registrarse.', 'danger');
          return;
        }

        sessionStorage.setItem('fivox_token', data.data.token);
        sessionStorage.setItem('fivox_user', JSON.stringify(data.data.user));

        showAlert('¡Cuenta creada! Redirigiendo...', 'success');
        setTimeout(() => window.location.href = '/home', 1500);

      } catch (err) {
        console.error(err);
        showAlert('No se pudo conectar con el servidor.', 'danger');
      } finally {
        setLoading(false);
      }
    });

    function showAlert(message, type) {
      alertBox.className = `alert alert-${type} alert-msg`;
      alertBox.textContent = message;
    }

    function clearAlert() {
      alertBox.className = 'd-none';
      alertBox.textContent = '';
    }

    function setLoading(loading) {
      btnRegister.disabled = loading;
      btnRegister.innerHTML = loading
        ? '<span class="spinner-border spinner-border-sm me-2"></span> Registrando...'
        : '<i class="bi bi-person-plus me-2"></i> Registrarme';
    }
  </script>

</body>
</html>
