<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - FIVOX</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="/css/loginstyle.css">


</head>

<body>

  <div class="container-fluid h-100 d-flex justify-content-center align-items-center p-4">

    <div class="login-container row g-0">

      <div class="col-lg-7 d-flex flex-column justify-content-between p-5 left-side">

        <div class="logo">
          FIVOX
        </div>

        <div class="w-75">

          <h1 class="left-title mb-4">
            Unite a la comunidad.
          </h1>

          <p class="left-text">
            Creá tu cuenta y empezá a conectar
            con profesionales y clientes
            en un solo lugar.
          </p>

        </div>

        <div></div>

        <div class="circle circle1"></div>
        <div class="circle circle2"></div>

      </div>

      <div class="col-lg-5 d-flex align-items-center justify-content-center p-5 right-side">

        <div class="w-100 form-box">

          <h2 class="login-title mb-2">
            Crear cuenta
          </h2>

          <p class="subtitle mb-4">
            Completá tus datos para registrarte
          </p>

          <div id="alert-box" class="d-none"></div>

          <form id="register-form" novalidate>

            <div class="mb-4">

              <label class="form-label">
                Nombre
              </label>

              <input
                type="text"
                id="name"
                class="form-control"
                placeholder="Tu nombre"
                required
              >

            </div>

            <div class="mb-4">

              <label class="form-label">
                Email
              </label>

              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="ejemplo@email.com"
                required
              >

            </div>

            <div class="mb-4">

              <label class="form-label">
                Teléfono
              </label>
            
              <input
                type="tel"
                id="phone"
                class="form-control"
                placeholder="Ej: 1123456789"
                required
              >
            
            </div>

            <div class="mb-4">

              <label class="form-label">
                Contraseña
              </label>

              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Mínimo 6 caracteres"
                minlength="6"
                required
              >

            </div>

            <button id="btn-register" class="btn btn-login w-100" type="submit">

              <i class="bi bi-person-plus me-2"></i>

              Registrarme

            </button>

          </form>

          <div class="text-center mt-4">

            <span class="text-secondary">
              ¿Ya tenés cuenta?
            </span>

            <a href="/" class="custom-link">
              Iniciar sesión
            </a>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script src="/js/register.js"></script>

</body>
</html>
