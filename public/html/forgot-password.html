<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña - FIVOX</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="/css/loginstyle.css">

</head>

<body>

  <div class="container-fluid h-100 d-flex justify-content-center align-items-center p-4">

    <div class="login-container row g-0">

      <div class="col-lg-7 d-flex flex-column justify-content-between p-5 left-side">

        <div class="logo">
          FIVOX
        </div>

        <div class="w-75">

          <h1 class="left-title mb-4">
            Recuperá tu acceso.
          </h1>

          <p class="left-text">
            Te ayudamos a volver a tu cuenta
            de forma segura.
          </p>

        </div>

        <div></div>

        <div class="circle circle1"></div>
        <div class="circle circle2"></div>

      </div>

      <div class="col-lg-5 d-flex align-items-center justify-content-center p-5 right-side">

        <div class="w-100 form-box text-center">

          <i class="bi bi-envelope-open text-secondary mb-3" style="font-size: 48px;"></i>

          <h2 class="login-title mb-2">
            Recuperar contraseña
          </h2>

          <p class="subtitle mb-4">
            Esta función estará disponible próximamente.
            Por ahora, contactá al administrador de la plataforma.
          </p>

          <a href="/" class="btn btn-login w-100">

            <i class="bi bi-arrow-left me-2"></i>

            Volver al login

          </a>

        </div>

      </div>

    </div>

  </div>

</body>
</html>
