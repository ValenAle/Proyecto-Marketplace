<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login - FIVOX</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="loginstyle.css">

  <style>
    .alert-msg {
      border-radius: 12px;
      font-size: 14px;
      padding: 10px 14px;
    }
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none !important;
    }
  </style>

</head>

<script src="login.js"></script>

<body>

  <div class="container-fluid h-100 d-flex justify-content-center align-items-center p-4">

    <div class="login-container row g-0">

      <div class="col-lg-7 d-flex flex-column justify-content-between p-5 left-side">

        <div class="logo">
          FIVOX
        </div>

        <div class="w-75">

          <h1 class="left-title mb-4">
            Encontrá servicios
            de forma simple.
          </h1>

          <p class="left-text">
            Conectate con profesionales,
            técnicos, docentes y freelancers
            cerca tuyo.
            Todo en un solo lugar.
          </p>

        </div>

        <div></div>

        <div class="circle circle1"></div>
        <div class="circle circle2"></div>

      </div>

      <div class="col-lg-5 d-flex align-items-center justify-content-center p-5 right-side">

        <div class="w-100 form-box">

          <h2 class="login-title mb-2">
            Iniciar sesión
          </h2>

          <p class="subtitle mb-4">
            Ingresá tus datos para continuar
          </p>

          <div id="alert-box" class="d-none"></div>

          <form id="login-form" novalidate>

            <div class="mb-4">

              <label class="form-label">
                Email
              </label>

              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="ejemplo@email.com"
                required
              >

            </div>

            <div class="mb-4">

              <label class="form-label">
                Contraseña
              </label>

              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="••••••••"
                required
              >

            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">

              <div class="form-check">

                <input
                  class="form-check-input"
                  type="checkbox"
                  id="remember"
                >

                <label
                  class="form-check-label"
                  for="remember"
                >
                  Recordarme
                </label>

              </div>

              <a href="forgot-password.html" class="custom-link">
                ¿Olvidaste tu contraseña?
              </a>

            </div>

            <button id="btn-login" class="btn btn-login w-100" type="submit">

              <i class="bi bi-box-arrow-in-right me-2"></i>

              Ingresar

            </button>

          </form>

          <div class="text-center mt-4">

            <span class="text-secondary">
              ¿No tenés cuenta?
            </span>

            <a href="register.html" class="custom-link">
              Registrate
            </a>

          </div>

        </div>

      </div>

    </div>

  </div>

  

</body>
</html>
